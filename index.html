<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student List DOM Practice</title>
    <link rel="stylesheet" href="dom.css">
</head>

<body>

    <h1>Student List</h1>

    <!-- Student Form -->
    <form id="student-form">

        <label>Student Name:</label>
        <input type="text" id="student-name" placeholder="Enter student name">

        <label>Student ID:</label>
        <input type="text" id="student-id" placeholder="Enter student ID">

        <label>Semester:</label>
        <input type="text" id="student-semester" placeholder="Enter semester">

        <label>Email:</label>
        <input type="text" id="student-email" placeholder="Enter email">

        <button type="submit">Add Student</button>

    </form>

    <!-- Student List -->
    <ul id="student-list"></ul>

    <script src="dom.js"></script>

</body>
</html>
